name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: { python-version: "3.12" }
      - run: uv sync --frozen --all-extras
      - run: uv run ruff check src/lof tests
      - run: uv run ruff format --check src/lof tests

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: { python-version: "3.12" }
      - run: uv sync --frozen --all-extras
      - run: uv run python -m pytest tests -v --tb=short -x

  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: { python-version: "3.12" }
      - run: uv sync --frozen --all-extras
      - run: uv run python -m lof.cli constraints validate
      - run: uv run python -m lof.cli bench run
      - run: uv run python -m lof.cli compile

  generated-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: { python-version: "3.12" }
      - run: uv sync --frozen --all-extras
      - run: uv run python -m lof.cli compile

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: { python-version: "3.12" }
      - run: uv sync --frozen --all-extras
      - run: uv export --frozen --no-dev --no-hashes -o /tmp/requirements.txt
      - run: pip install pip-audit
      - run: pip-audit -r /tmp/requirements.txt
