name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
        working-directory: ${{ github.workspace }}

      - name: Validate JSON schemas
        run: lof validate

      - name: Validate dependencies
        run: lof check

      - name: Compile project
        run: lof compile

      - name: Run tests
        run: python -m pytest framework/tests -v

      - name: Lint with Ruff
        run: python -m ruff check framework/src framework/tests

      - name: Type check with Pyright
        run: python -m pyright framework/src framework/tests
        continue-on-error: true

      - name: Check generated files are not modified
        run: |
          if git diff --name-only | grep -q "^generated/"; then
            echo "ERROR: Generated files have been modified manually"
            exit 1
          fi

      - name: Verify deterministic build
        run: |
          lof compile
          if git diff --name-only | grep -q "^generated/"; then
            echo "ERROR: Build is not deterministic"
            exit 1
          fi

      - name: Run Bazel tests
        run: bazel test //...
        continue-on-error: true
