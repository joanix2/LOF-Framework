services:
  api:
    build: apps/api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/isoclim.db
    volumes:
      - api-data:/app/data

  web:
    build: apps/web
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - api

volumes:
  api-data:
