services:
  api:
    build: apps/api
    ports: ["8001:8000"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://isoclim:isoclim@db:5432/isoclim
      - PYTHONPATH=/app/src
    volumes:
      - ./apps/api/src:/app/src
    depends_on: [db]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build: apps/web
    ports: ["5174:5173"]
    volumes:
      - ./apps/web/src:/app/src
    depends_on: [api]
    environment:
      - VITE_API_URL=http://localhost:8001/api/v1

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: isoclim
      POSTGRES_PASSWORD: isoclim
      POSTGRES_DB: isoclim
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
